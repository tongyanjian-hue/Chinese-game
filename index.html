<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>紅樓夢遊戲</title>
    <style>
      :root {
        --primary-color: #8b0000; /* 深紅色，象徵紅樓 */
        --bg-color: #f5f5dc; /* 米白色，象徵宣紙 */
        --text-color: #333;
      }

      body {
        font-family: "Microsoft JhengHei", "微軟正黑體", serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      #game-container {
        width: 90%;
        max-width: 600px;
        background: white;
        padding: 2rem;
        border-radius: 8px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        border: 2px solid var(--primary-color);
        text-align: center;
      }

      h1 {
        color: var(--primary-color);
        border-bottom: 2px solid var(--primary-color);
        padding-bottom: 0.5rem;
      }

      #story-text {
        font-size: 1.2rem;
        line-height: 1.8;
        margin: 2rem 0;
        min-height: 100px;
      }

      .options-container {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      button {
        background-color: white;
        border: 1px solid var(--primary-color);
        color: var(--primary-color);
        padding: 0.8rem 1.5rem;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s;
        border-radius: 4px;
      }

      button:hover {
        background-color: var(--primary-color);
        color: white;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <h1>賈寶玉的喜好</h1>
      <div id="story-text">
        你是賈寶玉。大觀園的姐姐妹妹們都各有特色，你將選擇其中一位與他創造美好結局。請先選擇喜歡的特質
      </div>
      <div class="options-container" id="options">
        <button onclick="choose(1)">口齒伶俐，個性率真</button>
        <button onclick="choose(2)">競競業業，處事圓融</button>
      </div>
    </div>

    <script>
      const story = {
        start: {
          text: "你是賈寶玉。大觀園的姐姐妹妹們都各有特色，你將選擇其中一位與他創造美好結局。請先選擇喜歡的特質",
          options: [
            { text: "口齒伶俐，個性率真", next: "ask1" },
            { text: "競競業業，處事圓融", next: "ask2" },
          ],
        },
        ask1: {
          text: "請繼續選擇",
          options: [
            { text: "大家閨秀", next: "end1" },
            { text: "地位較低", next: "end2" },
          ],
        },
        ask2: {
          text: "請繼續選擇",
          options: [
            { text: "希望你上進", next: "end3" },
            { text: "順從", next: "end4" },
          ],
        },
        end1: {
          text: "你選擇了林黛玉",
          options: [{ text: "重新開始", next: "start" }],
        },
        end2: {
          text: "你選擇了晴雯",
          options: [{ text: "重新開始", next: "start" }],
        },
        end3: {
          text: "你選擇了薛寶釵",
          options: [{ text: "重新開始", next: "start" }],
        },
        end4: {
          text: "你選擇了襲人",
          options: [{ text: "重新開始", next: "start" }],
        },
      };

      function choose(choiceIndex) {
        const currentText = document.getElementById("story-text").innerText;
        let currentState;

        // 找出目前的狀態
        for (let key in story) {
          if (story[key].text === currentText) {
            currentState = story[key];
            break;
          }
        }

        if (!currentState) currentState = story.start;

        const nextKey = currentState.options[choiceIndex - 1].next;
        updatePage(nextKey);
      }

      function updatePage(key) {
        const state = story[key];
        document.getElementById("story-text").innerText = state.text;
        const optionsDiv = document.getElementById("options");
        optionsDiv.innerHTML = "";

        state.options.forEach((opt, index) => {
          const btn = document.createElement("button");
          btn.innerText = opt.text;
          btn.onclick = () => updatePage(opt.next);
          optionsDiv.appendChild(btn);
        });
      }
    </script>
  </body>
</html>
